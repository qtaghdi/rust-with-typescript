# fly.toml app configuration file generated for rust-sandbox-runner on 2026-03-11T13:22:50+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'rust-sandbox-runner'
primary_region = 'nrt'

[build]

[env]
  RUNNER_COMPILE_TIMEOUT_MS = "20000"
  RUNNER_RUN_TIMEOUT_MS = "10000"

[http_service]
  internal_port = 4100
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
