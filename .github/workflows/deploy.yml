name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ── Build + deploy to Cloudflare Workers ────────────────────────────────────
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://qtaghdi.com

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── Create release tag + GitHub Release with changelog ──────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Bump version from conventional commits and generate changelog
      # feat: → minor, fix/chore/docs/style/… → patch, BREAKING CHANGE → major
      - name: Create tag and changelog
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      # Publish GitHub Release with the generated changelog as release notes
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
