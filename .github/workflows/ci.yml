name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Astro site: type-check + build ──────────────────────────────────────────
  astro:
    name: Astro (type-check + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check
        run: bun run astro check

      - name: Build
        run: bun run build

  # ── sandbox-runner: Rust lint + test ────────────────────────────────────────
  sandbox-runner:
    name: sandbox-runner (clippy + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sandbox-runner

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sandbox-runner

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test
